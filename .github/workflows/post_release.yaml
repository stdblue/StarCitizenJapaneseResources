name: Post Release to X

on:
  release:
    types: [published, edited]

  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install tweepy

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        # Release コンテキストから直接渡す
          RELEASE_TITLE: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          python << 'EOF'
          import os
          import tweepy

          # 環境変数から取得
          body = os.environ["RELEASE_BODY"]
          url = os.environ["RELEASE_URL"]
          title = os.environ["RELEASE_TITLE"]

          # 手動実行などで情報が空の場合
          if not title or title == "None":
            print("Manual trigger detected. Fetching the very latest release (including prerelease)...")
            repo = os.environ["GITHUB_REPOSITORY"]

            # /releases/latest ではなく /releases を使う
            api_url = f"https://api.github.com/repos/{repo}/releases?per_page=1"
            resp = requests.get(api_url)
            if resp.status_code == 200:
              releases = resp.json()
              if releases:
                data = releases[0] # 一番上のリリース（最新）
                title = data.get("name") or data.get("tag_name")
                body = data.get("body", "")
                url = data.get("html_url")
                is_prerelease = data.get("prerelease", False)
                print(f"Found: {title} (Prerelease: {is_prerelease})")
              else:
                print(f"Failed to fetch releases: {resp.status_code}")
                return

          # 1. 「### 変更内容」という行を探す
          target_keyword = "### 変更内容"
          lines = body.split('\n')
          start_index = -1

          for i, line in enumerate(lines):
            if target_keyword in line:
              start_index = i
              break

          # 2. キーワードが見つかった場合、その後の有効な3行を抽出
          summary_lines = []
          if start_index != -1:
            for line in lines[start_index + 1:]:
              clean_line = line.strip()
              if clean_line: # 空行はスキップ
                summary_lines.append(clean_line)
              if len(summary_lines) == 3: # 3行取れたら終了
                break

          summary = "\n".join(summary_lines)
        
          # 3. ツイート本文の組み立て
          tweet_text = f"【StarCitizen 日本語化更新】\n{title}\n\n{summary}\n\n▼詳細はこちら\n{url}"

          # 4. 投稿
          try:
            auth = tweepy.OAuth1UserHandler(
              os.environ["X_API_KEY"],
              os.environ["X_API_SECRET"],
              os.environ["X_ACCESS_TOKEN"],
              os.environ["X_ACCESS_TOKEN_SECRET"]
            )
            api = tweepy.API(auth)

            client = tweepy.Client(
              consumer_key=os.environ["X_API_KEY"],
              consumer_secret=os.environ["X_API_SECRET"],
              access_token=os.environ["X_ACCESS_TOKEN"],
              access_token_secret=os.environ["X_ACCESS_TOKEN_SECRET"]
            )

            # Xの280文字制限に合わせてカット
            if not tweet_text.strip():
              tweet_text = "StarCitizen 日本語化更新通知（テスト）"
            
            client.create_tweet(text=tweet_text[:280])
            print("Successfully posted to X!")
          
          except Exception as e:
            print(f"Error posting to X: {e}")
            exit(1)
          EOF